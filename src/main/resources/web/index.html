<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake3D — 3D贪吃蛇</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div id="game-container"></div>

    <div id="hud">
        <div class="hud-item" id="hud-p1">
            <div class="hud-label">P1 Score</div>
            <div id="score-display">0</div>
        </div>
        <div class="hud-item" id="hud-p2" style="display:none;">
            <div class="hud-label">P2 Score</div>
            <div id="score2-display">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Level</div>
            <div id="speed-display">Lv.1</div>
        </div>
    </div>

    <!-- 开始界面 -->
    <div id="overlay-start" class="overlay">
        <div class="overlay-title">SNAKE 3D</div>
        <div class="overlay-subtitle">3D 贪吃蛇</div>
        <div class="map-settings">
            <div class="setting-row">
                <label>地图：</label>
                <select id="sel-grid-size">
                    <option value="12">小 (12x12)</option>
                    <option value="18" selected>中 (18x18)</option>
                    <option value="24">大 (24x24)</option>
                </select>
            </div>
            <div class="setting-row">
                <label>场景：</label>
                <select id="sel-theme">
                    <option value="dark">经典暗黑</option>
                    <option value="green">森林草地</option>
                    <option value="desert">沙漠荒原</option>
                    <option value="ice">冰原寒地</option>
                </select>
            </div>
            <div class="setting-row">
                <label>难度：</label>
                <select id="sel-difficulty">
                    <option value="easy">简单</option>
                    <option value="normal" selected>普通</option>
                    <option value="hard">困难</option>
                </select>
            </div>
        </div>
        <div class="overlay-controls">
            <div class="control-key"><kbd>W A S D</kbd> P1</div>
            <div class="control-key"><kbd>&#8593;&#8592;&#8595;&#8594;</kbd> P2</div>
            <div class="control-key"><kbd>Space</kbd> 暂停</div>
        </div>
        <div class="mode-buttons">
            <button id="btn-start" class="btn btn-primary">单人模式</button>
            <button id="btn-start-2p" class="btn btn-blue">双人对战</button>
        </div>
        <div class="overlay-hint">单人按 <kbd>空格</kbd> 开始，双人点击按钮</div>
    </div>

    <!-- 游戏结束界面 -->
    <div id="overlay-over" class="overlay" style="display:none;">
        <div class="gameover-label" id="winner-text">游戏结束</div>
        <div class="gameover-score" id="final-score" style="display:none;">0</div>
        <div class="gameover-high" id="high-score-wrap">最高分：<span id="high-score">0</span></div>
        <button id="btn-restart" class="btn btn-danger">再来一局</button>
        <div class="overlay-hint">按 <kbd>空格键</kbd> 重新开始</div>
    </div>

    <!-- 暂停界面 -->
    <div id="overlay-pause" class="overlay" style="display:none;">
        <div class="pause-text">暂停</div>
        <div class="overlay-hint">按 <kbd>空格键</kbd> 继续</div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <!-- 游戏脚本 -->
    <script src="/js/game-core.js"></script>
    <script src="/js/scene.js"></script>
    <script src="/js/main.js"></script>

</body>
</html>
